name: Deploy

on:
  push:
    branches: [main, develop]

# Un despliegue a la vez por entorno; no se cancela a mitad.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  desplegar:
    name: Migraciones + Railway
    runs-on: ubuntu-latest
    # `develop` = staging · `main` = producción (HU-0.3).
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      # ── 1. Migraciones de Supabase, versionadas y reproducibles ──────────
      # Van ANTES del despliegue: el código nuevo asume el esquema nuevo.
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Aplicar migraciones
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "${{ vars.SUPABASE_PROJECT_REF }}"
          supabase db push

      # ── 2. Railway ───────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Desplegar servicios
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          # SIEMPRE explícito: `railway environment new` cambia el entorno
          # enlazado y un `up` sin `-e` despliega al que no toca.
          RAILWAY_ENV: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
        run: |
          # Los project tokens de Railway están acotados a UN entorno. Si el de
          # este entorno aún no existe, se avisa y se sale sin romper el pipeline:
          # las migraciones ya se aplicaron y eso sí debe considerarse un éxito.
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::No hay RAILWAY_TOKEN para '$RAILWAY_ENV'. Se omite el despliegue."
            echo "Créalo en Railway → Settings → Tokens y añádelo con:"
            echo "  gh secret set RAILWAY_TOKEN --env $RAILWAY_ENV --body '<token>'"
            exit 0
          fi

          npm i -g @railway/cli
          for servicio in api worker web; do
            echo "── Desplegando $servicio → $RAILWAY_ENV ──"
            railway up --service "$servicio" --environment "$RAILWAY_ENV" --ci --yes
          done

      - name: Smoke test del API
        if: github.ref == 'refs/heads/main'
        run: |
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              https://api-production-f113.up.railway.app/api/health || true)
            [ "$code" = "200" ] && { echo "✓ API viva"; exit 0; }
            sleep 15
          done
          echo "✗ El API no respondió 200 tras el despliegue"; exit 1
